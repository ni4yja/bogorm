name: CD

on:
  push:
    branches: [main]

env:
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/bogorm-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/bogorm-frontend

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    env:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GHCR_ACTOR: ${{ github.actor }}
      BACKEND_TAG: ${{ needs.build-backend.outputs.image-tag }}
      FRONTEND_TAG: ${{ needs.build-frontend.outputs.image-tag }}
      BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/bogorm-backend
      FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/bogorm-frontend
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          command_timeout: 30m
          envs: GHCR_TOKEN,GHCR_ACTOR,BACKEND_TAG,FRONTEND_TAG,BACKEND_IMAGE,FRONTEND_IMAGE
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin
            cd /app/bogorm
            git pull origin main
            BACKEND_IMAGE=$BACKEND_IMAGE:$BACKEND_TAG \
            FRONTEND_IMAGE=$FRONTEND_IMAGE:$FRONTEND_TAG \
            docker compose -f docker-compose.prod.yml pull
            BACKEND_IMAGE=$BACKEND_IMAGE:$BACKEND_TAG \
            FRONTEND_IMAGE=$FRONTEND_IMAGE:$FRONTEND_TAG \
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml exec -T web python manage.py migrate
            docker compose -f docker-compose.prod.yml exec -T web python manage.py collectstatic --noinput