services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: bogorm
      POSTGRES_USER: bogorm
      POSTGRES_PASSWORD: bogorm
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgis://bogorm:bogorm@db:5432/bogorm

volumes:
  postgres_data:
