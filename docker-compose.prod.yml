services:
  db:
    image: imresamu/postgis:16-3.4
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bogorm -d bogorm"]
      interval: 5s
      retries: 5

  web:
    image: ghcr.io/ni4yja/bogorm-backend:latest
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2
    ports:
      - "8000:8000"
    volumes:
      - ./backend/staticfiles:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production

  frontend:
    image: ghcr.io/ni4yja/bogorm-frontend:latest
    command: node .output/server/index.mjs
    ports:
      - "3000:3000"
    depends_on:
      - web
    env_file:
      - .env

volumes:
  postgres_data:
